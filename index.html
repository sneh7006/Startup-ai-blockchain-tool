<!DOCTYPE html>
<html>
<head>
    <title>Smart Lead Analyzer</title>
    <meta charset="UTF-8">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #2a5298;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            color: white;
            font-size: 12px;
        }

        .hot { background: #e74c3c; }
        .warm { background: #f39c12; }
        .cold { background: #3498db; }

    </style>
</head>

<body>

<div class="container">

    <!-- 🔗 WALLET UI (ADD HERE) -->
    <button onclick="connectWallet()">🔗 Connect Wallet</button>

    <p id="walletAddress" style="font-size:12px; color:gray; margin-top:10px;">
        Not connected
    </p>

    <!-- Existing content -->
    <div style="text-align:center;margin-bottom:10px:">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712100.png" width="60">
    </div>

    <div id="loading" style="display:none; text-align:center; margin-top:10px;">
        ⏳ Processing...
    </div>

    <h2>🚀 Smart Lead Analyzer</h2>

    <p style="font-size:12px; color:gray;">
        AI-powered lead classification with blockchain logging 
    </p>

    <input type="text" id="name" placeholder="Enter Name">
    <textarea id="message" placeholder="Enter Message"></textarea>

    <button onclick="processLead()">Analyze</button>

    <div id="result"></div>

</div>

<!-- Web3 -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>

<!-- Your JS -->
<script src="app.js"></script>

</body>
</html>
